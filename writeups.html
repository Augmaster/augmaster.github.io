<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Writeups</title>
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/media.css" />
    <link rel="stylesheet" href="css/writeups.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css"
      integrity="sha512-1cK78a1o+ht2JcaW6g8OXYwqpev9+6GqOkz9xmBN9iUUhIndKtxwILGWYOSibOKjLsEdjyjZvYDq/cZwNeak0w=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script defer src="js/writeups.js"></script> <!-- Script to load writeups dynamically -->

  </head>

  <body>
    <div id="nav-placeholder"></div>

    <section id="home" class="hero writeups-hero">
      <div class="container container-lg">
        <div
          class="hero-row"
          data-aos="fade-zoom-in"
          data-aos-easing="ease-in-out"
          data-aos-delay="500"
          data-aos-duration="1000"
        >
        <div class="hero-content">
          <h1 class="hero-heading">Writeups</h1>
            <span class="hero-heading-subtitle writeups-subtitle"
              >Challenges are from <a href="https://tryhackme.com/r/hacktivities/challenges">TryHackMe Website</a></span
            >
            <div>
              <a href="index.html#home" class="btn">Portfolio</a>
              <a href="index.html#contact" class="btn btn-white">Contact Me</a>
            </div>
          </div>
          <div class="hero-iframe">
            <iframe
            id="tryhackme-badge"
            src="https://tryhackme.com/api/v2/badges/public-profile?userPublicId=3161198"
            style="border: none;"
          ></iframe>
          </div>
        </div>
      </div>
    </section>

    <!-- Writeups Section -->
    <section id="writeups" class="writeups">
      <div class="container">
        <div class="writeups-title" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="300">
          <h2 class="title">Recent Challenges</h2>
        </div>
        <div class="filter-container" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="300">
          <label for="category-filter">Category:</label>
          <select id="category-filter">
            <option value="all">All Categories</option>
          </select>
        
          <label for="difficulty-filter">Difficulty:</label>
          <select id="difficulty-filter">
            <option value="all">All Levels</option>
          </select>
        </div>
        <div class="writeups-grid" id="writeups-container">
          <!-- JavaScript will load writeups here -->
        </div>
      </div>
    </section>

    <div id="footer-placeholder"></div> <!-- Footer will be injected here -->

    <div id="goToTop" class="goToTop">
      <a href="#home">
        <img src="img/icons/arrow_up.svg" alt="Back to top"
      /></a>
    </div>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"
      integrity="sha512-A7AYk1fGKX6S2SsHywmPkrnzTZHrgiVT7GcQkLGDe2ev0aWb8zejytzS8wjo7PGEXKqJOrjQ4oORtnimIRZBtw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script src="../js/components.js"></script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
